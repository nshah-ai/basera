<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basera Mockup Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F5EFE6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #3E3124;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 375px;
            height: 700px;
            background-color: #F5EFE6;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .illustration-container {
            width: 100%;
            height: 250px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .illustration-container svg {
            width: 100%;
            height: 100%;
        }
        h1 {
            font-size: 36px;
            font-weight: 600;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }
        p {
            color: #8C7E6D;
            font-size: 14px;
            margin: 0 0 48px 0;
        }
        .buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: auto;
        }
        .btn-primary {
            background-color: #C06C53;
            color: white;
            padding: 16px;
            border-radius: 16px;
            text-align: left;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: none;
        }
        .btn-secondary {
            background-color: #FFFFFF;
            border: 1px solid #E5D9C5;
            color: #3E3124;
            padding: 16px;
            border-radius: 16px;
            text-align: left;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .icon-box {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
        }
        .arrow { width: 20px; height: 20px; border-right: 2px solid currentColor; border-top: 2px solid currentColor; transform: rotate(45deg); display: inline-block; margin-right: 10px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="illustration-container">
            <!-- Our hand-crafted SVG Courtyard -->
            <svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M50 250 L350 250" stroke="#E5D9C5" stroke-width="2" />
              <rect x="70" y="80" width="10" height="170" fill="white" stroke="#E5D9C5" stroke-width="1" />
              <rect x="320" y="80" width="10" height="170" fill="white" stroke="#E5D9C5" stroke-width="1" />
              <path d="M80 80 Q 200 40 320 80" stroke="#E5D9C5" stroke-width="2" fill="none" />
              
              {/* Swing */}
              <line x1="150" y1="60" x2="150" y2="210" stroke="#8C7E6D" stroke-width="1" stroke-dasharray="2 2" />
              <line x1="250" y1="60" x2="250" y2="210" stroke="#8C7E6D" stroke-width="1" stroke-dasharray="2 2" />
              <rect x="130" y="210" width="140" height="6" fill="#3D2B1F" />

              {/* Minimal Couple */}
              <circle cx="185" cy="175" r="8" stroke="#3E3124" stroke-width="1.2" />
              <path d="M185 183 C 185 195 175 205 170 210" stroke="#3E3124" stroke-width="1.2" fill="none" />
              <circle cx="215" cy="173" r="7.5" stroke="#3E3124" stroke-width="1.2" />
              <path d="M215 180 C 215 195 230 205 235 210" stroke="#3E3124" stroke-width="1.2" fill="none" />
              
              {/* Plants */}
              <circle cx="60" cy="250" r="15" fill="#899B82" fill-opacity="0.1" />
              <path d="M60 250 Q 50 220 65 200" stroke="#899B82" stroke-width="1.5" fill="none" />
              <circle cx="340" cy="250" r="15" fill="#899B82" fill-opacity="0.1" />
              <path d="M340 250 Q 350 220 335 200" stroke="#899B82" stroke-width="1.5" fill="none" />
            </svg>
        </div>

        <h1>Basera</h1>
        <p>Where your home settles.</p>

        <div class="buttons">
            <div class="btn-primary">
                <span>Create New Household</span>
                <span style="font-size: 20px;">→</span>
            </div>
            <div class="btn-secondary">
                <span>Join Partner</span>
                <span style="font-size: 20px;">→</span>
            </div>
        </div>
    </div>
</body>
</html>
