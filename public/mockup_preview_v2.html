<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basera Mockup Preview - Lush</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F5EFE6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #3E3124;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 375px;
            height: 700px;
            background-color: #F5EFE6;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .illustration-container {
            width: 100%;
            height: 250px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .illustration-container svg {
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 36px;
            font-weight: 600;
            margin: 32px 0 12px 0;
            letter-spacing: -0.02em;
        }

        p {
            color: #8C7E6D;
            font-size: 14px;
            margin: 0 0 48px 0;
        }

        .buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: auto;
        }

        .btn-primary {
            background-color: #C06C53;
            color: white;
            padding: 16px;
            border-radius: 16px;
            text-align: left;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: none;
        }

        .btn-secondary {
            background-color: #FFFFFF;
            border: 1px solid #E5D9C5;
            color: #3E3124;
            padding: 16px;
            border-radius: 16px;
            text-align: left;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="illustration-container">
            <!-- Lush SVG Courtyard -->
            <svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M40 0 C 80 40 120 20 160 60 Q 300 130 400 60" stroke="#899B82" stroke-width="2"
                    stroke-opacity="0.2" />

                {/* Tree Branch */}
                <path d="M200 0 Q 180 100 0 80" stroke="#3D2B1F" stroke-width="4" stroke-opacity="0.1" />

                {/* Swing hanging from branch */}
                <line x1="80" y1="80" x2="80" y2="220" stroke="#8C7E6D" stroke-width="1.2" />
                <line x1="220" y1="80" x2="220" y2="220" stroke="#8C7E6D" stroke-width="1.2" />
                <rect x="60" y="220" width="180" height="8" rx="2" fill="#3D2B1F" />

                {/* Minimal Couple */}
                <circle cx="135" cy="180" r="10" stroke="#3E3124" stroke-width="1.5" />
                <path d="M135 190 Q 135 210 110 220" stroke="#3E3124" stroke-width="1.5" fill="none" />
                <circle cx="175" cy="178" r="9" stroke="#3E3124" stroke-width="1.5" />
                <path d="M175 187 Q 175 210 200 220" stroke="#3E3124" stroke-width="1.5" fill="none" />

                {/* Lush Plants */}
                <path d="M0 300 Q 50 200 100 300" fill="#899B82" fill-opacity="0.1" />
                <path d="M300 300 Q 350 150 400 300" fill="#899B82" fill-opacity="0.1" />
                <path d="M50 280 Q 30 240 60 220" stroke="#899B82" stroke-width="2" />
                <path d="M340 280 Q 370 240 330 220" stroke="#899B82" stroke-width="2" />
            </svg>
        </div>

        <h1>Basera</h1>
        <p>Where your home settles.</p>

        <div class="buttons">
            <div class="btn-primary">
                <span>Create New Household</span>
                <span style="font-size: 20px;">→</span>
            </div>
            <div class="btn-secondary">
                <span>Join Partner</span>
                <span style="font-size: 20px;">→</span>
            </div>
        </div>
    </div>
</body>

</html>
