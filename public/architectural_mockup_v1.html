<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basera Architectural Mockup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F5EFE6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #3E3124;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 375px;
            height: 722px;
            /* Matching the user's screenshot aspect */
            background-color: #F5EFE6;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .illustration-container {
            width: 100%;
            height: 280px;
            /* More space for the courtyard */
            margin-top: 40px;
            margin-bottom: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .illustration-container svg {
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 38px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.01em;
            color: #3E3124;
        }

        .tagline {
            color: #8C7E6D;
            font-size: 14px;
            margin: 0 0 48px 0;
            font-weight: 400;
        }

        .buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: auto;
            margin-bottom: 24px;
        }

        .btn-primary {
            background-color: #C16C53;
            /* Terracotta */
            color: white;
            padding: 18px 20px;
            border-radius: 18px;
            text-align: left;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-secondary {
            background-color: #FFFFFF;
            border: 1px solid #E5D9C5;
            color: #3E3124;
            padding: 18px 20px;
            border-radius: 18px;
            text-align: left;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-icon {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="illustration-container">
            <!-- Architectural Courtyard SVG -->
            <svg viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
                {/* Floor */}
                <path d="M0 400 L600 400 L480 300 L120 300 Z" fill="#E5D9C5" fill-opacity="0.2" />
                <line x1="120" y1="300" x2="480" y2="300" stroke="#E5D9C5" stroke-width="1.5" />

                {/* Perspective Tiles */}
                <line x1="200" y1="400" x2="240" y2="300" stroke="#E5D9C5" stroke-width="0.5" stroke-opacity="0.5" />
                <line x1="400" y1="400" x2="360" y2="300" stroke="#E5D9C5" stroke-width="0.5" stroke-opacity="0.5" />

                {/* Pillars in depth */}
                <rect x="140" y="50" width="12" height="250" fill="white" stroke="#E5D9C5" stroke-width="1" />
                <rect x="448" y="50" width="12" height="250" fill="white" stroke="#E5D9C5" stroke-width="1" />

                {/* Arch */}
                <path d="M152 70 Q 300 10 448 70" stroke="#E5D9C5" stroke-width="2" fill="none" opacity="0.3" />

                {/* Stone Jhula */}
                <line x1="220" y1="40" x2="220" y2="230" stroke="#8C7E6D" stroke-width="1.5" stroke-dasharray="3 2" />
                <line x1="380" y1="40" x2="380" y2="230" stroke="#8C7E6D" stroke-width="1.5" stroke-dasharray="3 2" />
                <rect x="190" y="230" width="220" height="10" rx="2" fill="#8C7E6D" fill-opacity="0.9" />
                <rect x="190" y="240" width="220" height="5" fill="#3D2B1F" fill-opacity="0.1" />

                {/* Couple */}
                <circle cx="270" cy="180" r="14" stroke="#3E3124" stroke-width="1.5" />
                <path d="M270 194 Q 270 220 240 230" stroke="#3E3124" stroke-width="1.5" fill="none" />
                <circle cx="330" cy="178" r="13" stroke="#3E3124" stroke-width="1.5" />
                <path d="M330 191 Q 330 220 360 230" stroke="#3E3124" stroke-width="1.5" fill="none" />

                {/* Surroundings */}
                <rect x="80" y="250" width="25" height="35" rx="3" fill="white" stroke="#E5D9C5" />
                <path d="M92 250 Q 80 200 60 210" stroke="#899B82" stroke-width="2" fill="none" />
                <rect x="495" y="250" width="25" height="35" rx="3" fill="white" stroke="#E5D9C5" />
                <path d="M507 250 Q 520 200 540 210" stroke="#899B82" stroke-width="2" fill="none" />
            </svg>
        </div>

        <h1>Basera</h1>
        <div class="tagline">Where your home settles.</div>

        <div class="buttons">
            <div class="btn-primary">
                <span style="display: flex; align-items: center; gap: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Create New Household
                </span>
                <span class="btn-icon">→</span>
            </div>
            <div class="btn-secondary">
                <span style="display: flex; align-items: center; gap: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" y1="8" x2="19" y2="14" />
                        <line x1="22" y1="11" x2="16" y2="11" />
                    </svg>
                    Join Partner
                </span>
                <span class="btn-icon">→</span>
            </div>
        </div>
    </div>
</body>

</html>
